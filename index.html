<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шмарио — Платформер</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'VT323', monospace;
    color: #fff;
  }
  #game-container {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%);
  }
  canvas {
    background: #000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    box-shadow: 0 0 40px rgba(255,255,255,0.1), 0 0 80px rgba(100,150,255,0.2);
    border: 4px solid #fff;
    max-width: 100%; max-height: 100%;
  }
  #ui-overlay {
    position: absolute;
    top: 20px; left: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #fff;
    text-shadow: 2px 2px 0 #000, 0 0 10px rgba(255,255,255,0.5);
    pointer-events: none;
    z-index: 10;
  }
  #ui-overlay .stat { margin-bottom: 8px; }
  #ui-overlay .label { color: #ffd700; }
  #ui-overlay .lives-icons { display: inline-flex; align-items: center; gap: 2px; vertical-align: middle; }
  #title-screen, #game-over-screen, #win-screen, #level-complete-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 20;
    text-align: center;
    padding: 20px;
  }
  .hidden { display: none !important; }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(20px, 5vw, 48px);
    margin-bottom: 30px;
    background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4d9de0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse 2s ease-in-out infinite;
  }
  .game-title {
    font-size: clamp(36px, 9vw, 84px) !important;
    letter-spacing: 4px;
    margin-bottom: 12px !important;
    text-shadow: none;
    filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.5));
  }
  .subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 2.4vw, 18px);
    color: #ffd700;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }
  .city-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 560px;
    width: 90%;
    margin-bottom: 24px;
  }
  .city-card {
    font-family: 'Press Start 2P', monospace;
    background: rgba(20, 20, 40, 0.7);
    border: 3px solid #ffd700;
    color: #fff;
    padding: 18px 12px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #000, inset 0 0 20px rgba(255, 215, 0, 0.1);
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    text-align: center;
    margin: 0;
  }
  .city-card:hover {
    background: rgba(255, 215, 0, 0.15);
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #000, inset 0 0 30px rgba(255, 215, 0, 0.3);
  }
  .city-card:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
  }
  .city-card .city-emoji {
    font-size: clamp(28px, 6vw, 44px);
    margin-bottom: 8px;
    line-height: 1;
  }
  .city-card .city-name {
    font-size: clamp(11px, 2vw, 16px);
    color: #ffd700;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .city-card .city-tag {
    font-family: 'VT323', monospace;
    font-size: clamp(13px, 2.2vw, 18px);
    color: #aaa;
    line-height: 1.2;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3vw, 32px);
    margin-bottom: 20px;
    color: #fff;
  }
  p { font-size: 24px; margin-bottom: 12px; color: #ddd; }
  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    padding: 16px 32px;
    margin-top: 20px;
    background: #ffd700;
    color: #000;
    border: 4px solid #fff;
    cursor: pointer;
    box-shadow: 6px 6px 0 #000;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover {
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 #000;
  }
  button:active {
    transform: translate(6px, 6px);
    box-shadow: 0 0 0 #000;
  }
  .controls-hint {
    font-size: 18px;
    color: #999;
    margin-top: 30px;
    line-height: 1.6;
  }
  .city-list {
    display: flex; flex-wrap: wrap; gap: 12px;
    justify-content: center; margin: 20px 0;
  }
  .city-list .city {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 10px 16px;
    border: 2px solid #ffd700;
    color: #ffd700;
  }
  #mobile-controls {
    position: absolute;
    bottom: 20px; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 15;
    pointer-events: none;
  }
  #mobile-controls .btn-group { display: flex; gap: 10px; pointer-events: auto; }
  .mbtn {
    width: 60px; height: 60px;
    background: rgba(255,255,255,0.2);
    border: 3px solid #fff;
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    font-family: 'Press Start 2P', monospace;
    user-select: none;
    touch-action: manipulation;
  }
  .mbtn:active { background: rgba(255,255,255,0.5); }
  @media (max-width: 768px), (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="960" height="540"></canvas>

  <div id="ui-overlay" class="hidden">
    <div class="stat"><span class="label">УРОВЕНЬ:</span> <span id="level-name">—</span></div>
    <div class="stat"><span class="label">МОНЕТЫ:</span> <span id="coins">0</span></div>
    <div class="stat"><span class="label">ЖИЗНИ:</span> <span id="lives" class="lives-icons"></span></div>
  </div>

  <div id="title-screen">
    <h1 class="game-title">ШМАРИО</h1>
    <p class="subtitle">Выбери город</p>
    <div class="city-grid">
      <button class="city-card" data-level="0">
        <div class="city-emoji">🌷</div>
        <div class="city-name">АМСТЕРДАМ</div>
        <div class="city-tag">Каналы &amp; велосипеды</div>
      </button>
      <button class="city-card" data-level="1">
        <div class="city-emoji">🏝</div>
        <div class="city-name">ПХУКЕТ</div>
        <div class="city-tag">Пляж &amp; кокосы</div>
      </button>
      <button class="city-card" data-level="2">
        <div class="city-emoji">🐉</div>
        <div class="city-name">ПЕКИН</div>
        <div class="city-tag">Драконы &amp; пагоды</div>
      </button>
      <button class="city-card" data-level="3">
        <div class="city-emoji">🏔</div>
        <div class="city-name">АЛМАТЫ</div>
        <div class="city-tag">Горы &amp; яблоки</div>
      </button>
    </div>
    <div class="controls-hint">
      ← → / A D — движение &nbsp; • &nbsp; ПРОБЕЛ / ↑ / W — прыжок<br>
      Дойди до ✈️ в конце уровня
    </div>
  </div>

  <div id="level-complete-screen" class="hidden">
    <h2 id="lc-title">УРОВЕНЬ ПРОЙДЕН!</h2>
    <p id="lc-stats">Монет собрано: 0</p>
    <button id="next-btn">СЛЕДУЮЩИЙ ГОРОД →</button>
  </div>

  <div id="game-over-screen" class="hidden">
    <h2 style="color:#ff4444;">GAME OVER</h2>
    <p id="go-stats">Ты не дошёл...</p>
    <button id="retry-btn">ПОПРОБОВАТЬ СНОВА</button>
  </div>

  <div id="win-screen" class="hidden">
    <h1>🏆 ПОБЕДА! 🏆</h1>
    <p style="font-size:24px;">Ты объехал весь мир!</p>
    <p id="win-stats">Всего монет: 0</p>
    <button id="restart-btn">ИГРАТЬ СНОВА</button>
  </div>

  <div id="mobile-controls">
    <div class="btn-group">
      <button class="mbtn" id="btn-left">◀</button>
      <button class="mbtn" id="btn-right">▶</button>
    </div>
    <div class="btn-group">
      <button class="mbtn" id="btn-jump">▲</button>
    </div>
  </div>

// === CANVAS SETUP ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const GAME_W = 960;
const GAME_H = 540;
// Зум камеры: мир рендерится крупнее, но мы видим только VIEW_W x VIEW_H пикселей
const ZOOM = 1.5;
const VIEW_W = GAME_W / ZOOM;
const VIEW_H = GAME_H / ZOOM;

function resizeCanvas() {
  const container = document.getElementById('game-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const scale = Math.min(cw / GAME_W, ch / GAME_H);
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

faceImg.src = 'data:image/png;base64,' + FACE_B64;

// === ИНПУТ ===
const keys = { left: false, right: false, jump: false, jumpPressed: false };
window.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    if (!keys.jump) keys.jumpPressed = true;
    keys.jump = true;
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
});

// Mobile controls
function bindHold(id, prop) {
  const el = document.getElementById(id);
  const on = (e) => { e.preventDefault(); keys[prop] = true; if (prop === 'jump') keys.jumpPressed = true; };
  const off = (e) => { e.preventDefault(); keys[prop] = false; };
  el.addEventListener('touchstart', on);
  el.addEventListener('touchend', off);
  el.addEventListener('touchcancel', off);
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindHold('btn-left', 'left');
bindHold('btn-right', 'right');
bindHold('btn-jump', 'jump');

// === ИНИЦИАЛИЗАЦИЯ УРОВНЯ ===
let level = null;
function loadLevel(idx) {
  // глубокое копирование, чтобы не мутировать оригинал
  level = JSON.parse(JSON.stringify(LEVELS[idx]));
  player.x = level.spawn.x;
  player.y = level.spawn.y;
  player.vx = 0;
  player.vy = 0;
  player.invuln = 60;
  cameraX = 0;
  cameraY = 540 - VIEW_H;
  levelCoinsCollected = 0;
  document.getElementById('level-name').textContent = level.name;
  updateUI();
}

function updateUI() {
  document.getElementById('coins').textContent = totalCoins;
  // Рисуем сигареты вместо цифры
  const livesEl = document.getElementById('lives');
  livesEl.innerHTML = '';
  for (let i = 0; i < lives; i++) {
    livesEl.appendChild(makeCigaretteIcon());
  }
}

// Создаёт пиксельную иконку сигареты (SVG)
function makeCigaretteIcon() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 32 12');
  svg.setAttribute('width', '32');
  svg.setAttribute('height', '12');
  svg.style.marginRight = '4px';
  svg.style.imageRendering = 'pixelated';
  svg.style.verticalAlign = 'middle';
  svg.innerHTML = `
    <!-- Тело сигареты (белая бумага) -->
    <rect x="0" y="3" width="22" height="6" fill="#f5f0e0"/>
    <rect x="0" y="3" width="22" height="1" fill="#fff"/>
    <rect x="0" y="8" width="22" height="1" fill="#d8cfb8"/>
    <!-- Фильтр (оранжевый) -->
    <rect x="22" y="3" width="6" height="6" fill="#c89042"/>
    <rect x="22" y="3" width="6" height="1" fill="#dba258"/>
    <rect x="22" y="8" width="6" height="1" fill="#a06822"/>
    <!-- Полоска между бумагой и фильтром -->
    <rect x="20" y="3" width="1" height="6" fill="#a89868"/>
    <!-- Тлеющий кончик (красно-оранжевый) -->
    <rect x="0" y="3" width="2" height="6" fill="#ff4400"/>
    <rect x="0" y="4" width="1" height="4" fill="#ffaa00"/>
    <!-- Дымок -->

// === ФИЗИКА И КОЛЛИЗИЯ ===
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
  // Горизонтальное движение
  if (keys.left) { player.vx = -MOVE_SPEED; player.facing = -1; }
  else if (keys.right) { player.vx = MOVE_SPEED; player.facing = 1; }
  else { player.vx *= FRICTION; if (Math.abs(player.vx) < 0.1) player.vx = 0; }

  // Прыжок
  if (keys.jumpPressed && player.onGround) {
    player.vy = JUMP_POWER;
    player.onGround = false;
  }
  keys.jumpPressed = false;

  // Гравитация
  player.vy += GRAVITY;
  if (player.vy > 16) player.vy = 16;

  // Движение по X с коллизией
  player.x += player.vx;
  for (const p of level.platforms) {
    if (rectsOverlap(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > level.width) player.x = level.width - player.w;

  // Движение по Y с коллизией
  player.y += player.vy;
  player.onGround = false;
  for (const p of level.platforms) {
    if (rectsOverlap(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Падение в пропасть (используем мировые координаты)
  if (player.y > 650) {
    loseLife();
    return;
  }

  // Опасности (вода и т.д.)
  for (const h of level.hazards) {
    if (rectsOverlap(player, h)) {
      loseLife();
      return;
    }
  }

  // Камера: смещаем так, чтобы игрок был чуть выше центра, а земля видна
  const targetCam = player.x - VIEW_W / 3;
  cameraX += (targetCam - cameraX) * 0.1;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > level.width - VIEW_W) cameraX = level.width - VIEW_W;
  // Y-камера: целевая позиция такая, чтобы игрок был чуть выше середины
  // Земля на y=480, низ экрана нужен на y=540 (60 px ниже земли)
  // То есть cameraY должен быть около 540 - VIEW_H = 180
  const targetCamY = 540 - VIEW_H;
  cameraY += (targetCamY - cameraY) * 0.1;

  // Сбор монет
  for (const c of level.coins) {
    if (!c.collected && rectsOverlap(player, { x: c.x, y: c.y, w: 20, h: 20 })) {
      c.collected = true;
      totalCoins++;
      levelCoinsCollected++;
      updateUI();
    }
  }

  // Финиш
  if (rectsOverlap(player, { x: level.finish.x, y: level.finish.y, w: 30, h: 80 })) {
    onLevelComplete();
    return;
  }

  // Враги
  if (player.invuln > 0) player.invuln--;
  for (const e of level.enemies) {
    if (e.dead) continue;
    const eBox = getEnemyBox(e);
    if (rectsOverlap(player, eBox)) {
      // Прыжок сверху?
      if (player.vy > 0 && player.y + player.h - eBox.y < 20) {
        e.dead = true;
        player.vy = JUMP_POWER * 0.7;
      } else if (player.invuln === 0) {
        loseLife();
        return;
      }
    }
  }

  player.bobble += 0.2;
}

function getEnemyBox(e) {
  if (e.type === 'coconut') {
    // Падает с пальмы периодически
    return { x: e.x, y: e.y, w: 24, h: 24 };
  }
  if (e.type === 'lantern') {
    return { x: e.x, y: e.y - 20 - Math.sin(e.bob) * 15, w: 32, h: 32 };
  }
  if (e.type === 'tulip') return { x: e.x, y: e.y - 8, w: 28, h: 40 };
  if (e.type === 'snowball') return { x: e.x, y: e.y, w: 32, h: 32 };
  if (e.type === 'apple') return { x: e.x, y: e.y + 16, w: 24, h: 24 };
  if (e.type === 'dragon') return { x: e.x, y: e.y, w: 48, h: 32 };
  if (e.type === 'goat') return { x: e.x, y: e.y, w: 40, h: 36 };
  if (e.type === 'crab') return { x: e.x, y: e.y + 12, w: 36, h: 24 };
  if (e.type === 'bike') return { x: e.x, y: e.y, w: 40, h: 36 };
  return { x: e.x, y: e.y, w: 32, h: 32 };
}

function updateEnemies() {
  for (const e of level.enemies) {
    if (e.dead) continue;
    if (e.type === 'lantern') {
      e.bob = (e.bob || 0) + 0.05;
      e.x += e.dir * e.speed;
      if (e.x <= e.range[0]) e.dir = 1;
      if (e.x >= e.range[1]) e.dir = -1;
    } else if (e.type === 'coconut') {
      // Стационарная пальма с падающими кокосами
      if (!e.cooldown) e.cooldown = 0;
      e.cooldown--;
      if (e.cooldown <= 0 && !e.falling) {
        e.falling = true;
        e.fallY = e.y - 120;
        e.cooldown = 180;
      }
      if (e.falling) {
        e.fallY += 5;
        if (e.fallY >= e.y) {
          e.falling = false;
        }
      }
    } else {
      e.x += e.dir * e.speed;
      if (e.x <= e.range[0]) e.dir = 1;
      if (e.x >= e.range[1]) e.dir = -1;
    }
  }
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    gameState = 'gameOver';
    document.getElementById('go-stats').textContent = `Монет собрано: ${totalCoins}`;
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('ui-overlay').classList.add('hidden');
  } else {
    player.x = level.spawn.x;
    player.y = level.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.invuln = 90;
    cameraX = 0;
    updateUI();
  }
}

function onLevelComplete() {
  gameState = 'levelComplete';
  document.getElementById('lc-stats').textContent = `Монет на уровне: ${levelCoinsCollected} | Всего: ${totalCoins}`;
  document.getElementById('lc-title').textContent = `${level.name} ПРОЙДЕН!`;
  if (currentLevel >= LEVELS.length - 1) {
    // Победа
    gameState = 'win';
    document.getElementById('win-stats').textContent = `Всего собрано монет: ${totalCoins}`;
    document.getElementById('win-screen').classList.remove('hidden');
    document.getElementById('ui-overlay').classList.add('hidden');
  } else {
    document.getElementById('level-complete-screen').classList.remove('hidden');
    document.getElementById('ui-overlay').classList.add('hidden');
  }
}

function drawBackground() {
  const bg = level.bg;
  const parallax = cameraX * 0.3;
  if (bg === 'amsterdam') {
    // Небо
    const grad = ctx.createLinearGradient(0, cameraY, 0, cameraY + VIEW_H);
    grad.addColorStop(0, '#7ec8e3');
    grad.addColorStop(1, '#c9e9f5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, cameraY, VIEW_W, VIEW_H);
    // Птицы (пиксельные)
    ctx.fillStyle = '#3a3a3a';
    for (let i = 0; i < 4; i++) {
      const bx = ((i * 180 - parallax * 0.3) % (VIEW_W + 100)) - 50;
      const by = 200 + (i % 2) * 25;
      ctx.fillRect(bx, by, 2, 1);
      ctx.fillRect(bx + 2, by - 1, 2, 1);
      ctx.fillRect(bx + 4, by, 2, 1);
    }
    // Облака (объёмные)
    for (let i = 0; i < 6; i++) {
      const cx = ((i * 250 - parallax * 0.5) % (VIEW_W + 200)) - 100;
      const cy = 220 + (i % 2) * 30;
      ctx.fillStyle = '#fff';
      drawCloud(cx, cy);
      ctx.fillStyle = '#e0eef5';
      ctx.fillRect(cx - 5, cy + 8, 50, 4);
    }
    // Дальние домики (силуэт)
    for (let i = 0; i < 30; i++) {
      const hx = i * 90 - parallax * 0.5;
      const hh = 50 + (i * 7 % 30);
      ctx.fillStyle = '#6a5a8a';
      ctx.fillRect(hx, 480 - hh, 50, hh);
      ctx.fillStyle = '#4a3a6a';
      ctx.fillRect(hx, 480 - hh, 50, 2);
    }
    // Узкие домики на ближнем плане
    for (let i = 0; i < 20; i++) {
      const hx = i * 220 - parallax;
      const hh = 120 + (i % 3) * 30;
      const colors = ['#8b4513', '#a0522d', '#cd853f', '#d2691e', '#6b3410'];
      const colorIdx = i % colors.length;
      ctx.fillStyle = colors[colorIdx];
      ctx.fillRect(hx, 480 - hh, 90, hh);
      // Светлая правая часть (объём)
      ctx.fillStyle = '#000';
      ctx.globalAlpha = 0.2;
      ctx.fillRect(hx + 80, 480 - hh, 10, hh);
      ctx.globalAlpha = 1;
      // Крыша (ступенчатый щипец — типичный амстердамский)
      ctx.fillStyle = '#5c2c0c';
      // Ступеньки сверху
      ctx.fillRect(hx, 480 - hh - 8, 90, 8);
      ctx.fillRect(hx + 10, 480 - hh - 16, 70, 8);
      ctx.fillRect(hx + 25, 480 - hh - 24, 40, 8);
      ctx.fillRect(hx + 38, 480 - hh - 32, 14, 8);
      // Флюгер
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(hx + 43, 480 - hh - 40, 4, 8);
      ctx.fillRect(hx + 40, 480 - hh - 42, 10, 2);
      // Окна с рамами
      for (let r = 0; r < Math.floor(hh / 35); r++) {
        for (let c = 0; c < 2; c++) {
          const wx = hx + 15 + c * 35;
          const wy = 480 - hh + 20 + r * 35;
          // Тёмная рама
          ctx.fillStyle = '#3a2010';
          ctx.fillRect(wx - 2, wy - 2, 24, 26);
          // Стекло (светящееся в вечерних окнах)
          const lit = (i * 7 + r * 3 + c) % 5 === 0;
          ctx.fillStyle = lit ? '#ffeb99' : '#88aacc';
          ctx.fillRect(wx, wy, 20, 22);
          // Крест рамы
          ctx.fillStyle = '#3a2010';
          ctx.fillRect(wx + 9, wy, 2, 22);
          ctx.fillRect(wx, wy + 10, 20, 2);
          // Цветочный горшок на подоконнике
          if (r === 0) {
            ctx.fillStyle = '#aa4422';
            ctx.fillRect(wx - 2, wy + 22, 24, 4);
            ctx.fillStyle = '#cc2266';
            ctx.fillRect(wx + 3, wy + 18, 4, 4);
            ctx.fillRect(wx + 13, wy + 18, 4, 4);
          }
        }
      }
      // Дверь (на первом этаже центральная)
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(hx + 38, 480 - 28, 14, 28);
      ctx.fillStyle = '#5a3010';
      ctx.fillRect(hx + 40, 480 - 26, 10, 26);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(hx + 48, 480 - 14, 1, 2);
    }
  } else if (bg === 'phuket') {
    // Небо тропическое
    const grad = ctx.createLinearGradient(0, cameraY, 0, cameraY + VIEW_H);
    grad.addColorStop(0, '#ff9e7d');
    grad.addColorStop(0.5, '#ffd89b');
    grad.addColorStop(1, '#7fdbff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, cameraY, VIEW_W, VIEW_H);
    // Солнце с лучами
    const sunX = 800 - parallax * 0.2;
    const sunY = 240;
    ctx.fillStyle = '#fff5d6';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
    ctx.fill();
    // Внутреннее свечение
    ctx.fillStyle = '#ffffe0';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 40, 0, Math.PI * 2);
    ctx.fill();
    // Дорожка света на воде
    ctx.fillStyle = '#fff5d6';
    ctx.globalAlpha = 0.3;
    for (let r = 0; r < 5; r++) {
      const w = 80 - r * 10;
      ctx.fillRect(sunX - w/2, sunY + 80 + r * 6, w, 2);
    }
    ctx.globalAlpha = 1;
    // Чайки (M-образные)
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 5; i++) {
      const bx = ((i * 200 - parallax * 0.3) % (VIEW_W + 100)) - 50;
      const by = 200 + (i % 3) * 20;
      ctx.fillRect(bx, by, 2, 1);
      ctx.fillRect(bx + 2, by - 2, 2, 1);
      ctx.fillRect(bx + 4, by - 3, 2, 1);
      ctx.fillRect(bx + 6, by - 2, 2, 1);
      ctx.fillRect(bx + 8, by, 2, 1);
    }
    // Дальние горы-острова с детализацией
    for (let i = 0; i < 8; i++) {
      const mx = i * 350 - parallax * 0.4;
      ctx.fillStyle = i % 2 ? '#3d5a4a' : '#4a6a55';
      ctx.beginPath();
      ctx.moveTo(mx, 480);
      ctx.lineTo(mx + 100, 480 - 140);
      ctx.lineTo(mx + 200, 480 - 80);
      ctx.lineTo(mx + 300, 480 - 160);
      ctx.lineTo(mx + 400, 480);
      ctx.closePath();
      ctx.fill();
      // Светлая верхушка
      ctx.fillStyle = i % 2 ? '#5a7a6a' : '#6a8a75';
      ctx.fillRect(mx + 95, 480 - 135, 10, 8);
      ctx.fillRect(mx + 295, 480 - 155, 10, 8);
    }
    // Море (горизонт)
    ctx.fillStyle = '#4aaadd';
    ctx.fillRect(0, 475, VIEW_W, 5);
    // Парусные лодки
    for (let i = 0; i < 3; i++) {
      const lx = ((i * 380 - parallax * 0.5) % (VIEW_W + 100)) - 50;
      // Корпус
      ctx.fillStyle = '#5a3a2a';
      ctx.fillRect(lx, 470, 28, 6);
      ctx.fillRect(lx + 4, 468, 20, 2);
      // Мачта
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(lx + 13, 445, 2, 25);
      // Парус
      ctx.fillStyle = '#fff';
      ctx.fillRect(lx + 15, 448, 10, 22);
      ctx.fillRect(lx + 17, 446, 8, 2);
    }
    // Пальмы
    for (let i = 0; i < 15; i++) {
      const px = i * 280 - parallax * 0.7;
      drawPalm(px, 480);
    }
  } else if (bg === 'beijing') {
    // Небо красноватое (закат)
    const grad = ctx.createLinearGradient(0, cameraY, 0, cameraY + VIEW_H);
    grad.addColorStop(0, '#5e2c2c');
    grad.addColorStop(0.5, '#c54545');
    grad.addColorStop(1, '#f5b97c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, cameraY, VIEW_W, VIEW_H);
    // Звёзды
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 73 - parallax * 0.05) % VIEW_W + VIEW_W) % VIEW_W;
      const sy = 190 + (i * 31) % 80;
      ctx.fillRect(sx, sy, 1, 1);
      if (i % 4 === 0) {
        ctx.fillRect(sx + 1, sy, 1, 1);
        ctx.fillRect(sx, sy + 1, 1, 1);
      }
    }
    // Луна
    const moonX = 200 - parallax * 0.1;
    const moonY = 230;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 40, 0, Math.PI * 2);
    ctx.fill();
    // Кратеры
    ctx.fillStyle = '#d8d0c0';
    ctx.beginPath();
    ctx.arc(moonX - 12, moonY - 8, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX + 8, moonY + 5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX + 15, moonY - 12, 3, 0, Math.PI * 2);
    ctx.fill();
    // Подвесные фонарики (декоративные)
    ctx.fillStyle = '#1a1a1a';
    for (let i = 0; i < 15; i++) {
      const fx = i * 80 - parallax * 0.5;
      const fy = 200 + Math.floor(Math.sin(fx * 0.02 + Date.now() / 1000) * 3);
      // Гирлянда
      if (i > 0) {
        const fxPrev = (i-1) * 80 - parallax * 0.5;
        ctx.fillStyle = '#5a5a5a';
        ctx.fillRect(fxPrev, fy - 1, 80, 1);
      }
      // Фонарик
      ctx.fillStyle = '#cc1818';
      ctx.fillRect(fx - 4, fy, 8, 10);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(fx - 4, fy, 8, 2);
      ctx.fillRect(fx - 4, fy + 8, 8, 2);
      ctx.fillStyle = '#ffeb99';
      ctx.fillRect(fx - 1, fy + 3, 2, 4);
    }
    // Великая стена на заднем плане
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(0 - parallax * 0.4, 480);
    let wx = -parallax * 0.4;
    while (wx < VIEW_W + 200) {
      ctx.lineTo(wx, 480 - 100 - Math.sin(wx * 0.01) * 50);
      ctx.lineTo(wx + 60, 480 - 130 - Math.sin((wx + 60) * 0.01) * 50);
      wx += 60;
    }
    ctx.lineTo(wx, 480);
    ctx.closePath();
    ctx.fill();
    // Башни на стене
    let twx = -parallax * 0.4;
    while (twx < VIEW_W + 200) {
      const ty = 480 - 130 - Math.sin(twx * 0.01) * 50;
      // Башня
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(twx, ty - 30, 30, 30);
      // Крыша башни
      ctx.fillStyle = '#cc6600';
      ctx.beginPath();
      ctx.moveTo(twx - 4, ty - 30);
      ctx.lineTo(twx + 15, ty - 45);
      ctx.lineTo(twx + 34, ty - 30);
      ctx.closePath();
      ctx.fill();
      // Окно
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(twx + 12, ty - 22, 6, 8);
      twx += 240;
    }
    // Пагоды
    for (let i = 0; i < 8; i++) {
      const pgx = i * 400 + 100 - parallax * 0.6;
      drawPagoda(pgx, 480);
    }
  } else if (bg === 'almaty') {
    // Небо горное
    const grad = ctx.createLinearGradient(0, cameraY, 0, cameraY + VIEW_H);
    grad.addColorStop(0, '#4a7ab8');
    grad.addColorStop(1, '#c8dff5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, cameraY, VIEW_W, VIEW_H);
    // Солнце
    ctx.fillStyle = '#fff8dc';
    ctx.beginPath();
    ctx.arc(700 - parallax * 0.1, 220, 45, 0, Math.PI * 2);
    ctx.fill();
    // Облака на горах
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.7;
    for (let i = 0; i < 4; i++) {
      const cx = ((i * 280 - parallax * 0.3) % (VIEW_W + 200)) - 100;
      ctx.fillRect(cx, 280, 60, 6);
      ctx.fillRect(cx + 10, 276, 40, 4);
    }
    ctx.globalAlpha = 1;
    // Орлы (силуэты)
    ctx.fillStyle = '#3a2a1a';
    for (let i = 0; i < 3; i++) {
      const bx = ((i * 320 - parallax * 0.4) % (VIEW_W + 100)) - 50;
      const by = 230 + (i % 2) * 20;
      // Крылья V-образные
      ctx.fillRect(bx, by, 2, 1);
      ctx.fillRect(bx + 2, by - 2, 2, 1);
      ctx.fillRect(bx + 4, by - 3, 3, 1);
      ctx.fillRect(bx + 7, by - 2, 2, 1);
      ctx.fillRect(bx + 9, by, 2, 1);
      ctx.fillRect(bx + 4, by - 1, 3, 2);
    }
    // ДАЛЬНИЕ горы (фиолетовые)
    for (let i = 0; i < 6; i++) {
      const mx = i * 350 - parallax * 0.2;
      ctx.fillStyle = '#7a6a90';
      ctx.beginPath();
      ctx.moveTo(mx, 480);
      ctx.lineTo(mx + 100, 480 - 160);
      ctx.lineTo(mx + 220, 480 - 100);
      ctx.lineTo(mx + 340, 480 - 180);
      ctx.lineTo(mx + 450, 480);
      ctx.closePath();
      ctx.fill();
    }
    // СРЕДНИЕ горы со снегом
    for (let i = 0; i < 6; i++) {
      const mx = i * 400 - parallax * 0.4;
      ctx.fillStyle = '#5a6b80';
      ctx.beginPath();
      ctx.moveTo(mx, 480);
      ctx.lineTo(mx + 150, 480 - 200);
      ctx.lineTo(mx + 280, 480 - 120);
      ctx.lineTo(mx + 420, 480 - 240);
      ctx.lineTo(mx + 550, 480);
      ctx.closePath();
      ctx.fill();
      // Тёмная сторона (тень)
      ctx.fillStyle = '#4a5b70';
      ctx.beginPath();
      ctx.moveTo(mx + 150, 480 - 200);
      ctx.lineTo(mx + 280, 480 - 120);
      ctx.lineTo(mx + 200, 480 - 60);
      ctx.lineTo(mx + 100, 480 - 120);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#4a5b70';
      ctx.beginPath();
      ctx.moveTo(mx + 420, 480 - 240);
      ctx.lineTo(mx + 550, 480);
      ctx.lineTo(mx + 460, 480 - 100);
      ctx.closePath();
      ctx.fill();
      // Снежные шапки
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(mx + 120, 480 - 160);
      ctx.lineTo(mx + 150, 480 - 200);
      ctx.lineTo(mx + 180, 480 - 160);
      ctx.lineTo(mx + 165, 480 - 175);
      ctx.lineTo(mx + 155, 480 - 165);
      ctx.lineTo(mx + 140, 480 - 170);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(mx + 390, 480 - 200);
      ctx.lineTo(mx + 420, 480 - 240);
      ctx.lineTo(mx + 450, 480 - 200);
      ctx.lineTo(mx + 435, 480 - 215);
      ctx.lineTo(mx + 420, 480 - 220);
      ctx.lineTo(mx + 405, 480 - 210);
      ctx.closePath();
      ctx.fill();
      // Линии скальных трещин
      ctx.fillStyle = '#3a4b60';
      ctx.fillRect(mx + 140, 480 - 140, 2, 60);
      ctx.fillRect(mx + 410, 480 - 180, 2, 80);
    }
    // Юрты у подножия
    for (let i = 0; i < 5; i++) {
      const yx = i * 220 - parallax * 0.6 + 100;
      // Купол
      ctx.fillStyle = '#f0e8d8';
      ctx.beginPath();
      ctx.arc(yx, 470, 18, Math.PI, Math.PI * 2);
      ctx.fill();
      // Основа цилиндра
      ctx.fillRect(yx - 18, 470, 36, 10);
      // Тёмная сторона
      ctx.fillStyle = '#d8c8a8';
      ctx.fillRect(yx + 10, 470, 8, 10);
      // Дверь
      ctx.fillStyle = '#aa3322';
      ctx.fillRect(yx - 5, 472, 10, 8);
      // Дым из верхушки
      ctx.fillStyle = '#aaa';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(yx - 2, 448, 4, 4);
      ctx.fillRect(yx - 1, 442, 6, 4);
      ctx.fillRect(yx + 1, 436, 6, 4);
      ctx.globalAlpha = 1;
      // Узор на куполе
      ctx.fillStyle = '#aa3322';
      ctx.fillRect(yx - 1, 456, 2, 2);
      ctx.fillRect(yx - 8, 460, 2, 2);
      ctx.fillRect(yx + 6, 460, 2, 2);
    }
    // Ели на среднем плане
    for (let i = 0; i < 20; i++) {
      const tx = i * 200 - parallax * 0.7;
      drawSpruce(tx, 480);
    }
  }
}

function drawCloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI * 2);
  ctx.arc(x + 20, y - 6, 22, 0, Math.PI * 2);
  ctx.arc(x + 42, y, 18, 0, Math.PI * 2);
  ctx.arc(x + 22, y + 6, 16, 0, Math.PI * 2);
  ctx.fill();
}

function drawPalm(x, y) {
  // Ствол
  ctx.fillStyle = '#6b4423';
  ctx.fillRect(x - 6, y - 130, 12, 130);
  // Листья
  ctx.fillStyle = '#2d8a3e';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.save();
    ctx.translate(x, y - 130);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(35, 0, 35, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Кокосы
  ctx.fillStyle = '#3d2817';
  ctx.beginPath();
  ctx.arc(x - 5, y - 122, 5, 0, Math.PI * 2);
  ctx.arc(x + 6, y - 120, 5, 0, Math.PI * 2);
  ctx.fill();
}

function drawPagoda(x, y) {
  ctx.fillStyle = '#8b1818';
  // Несколько ярусов
  for (let i = 0; i < 4; i++) {
    const w = 80 - i * 12;
    const h = 30;
    const yy = y - 30 - i * 50;
    ctx.fillRect(x - w / 2, yy, w, h);
    // Крыша яруса
    ctx.fillStyle = '#c89a2a';
    ctx.beginPath();
    ctx.moveTo(x - w / 2 - 12, yy);
    ctx.lineTo(x, yy - 20);
    ctx.lineTo(x + w / 2 + 12, yy);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#8b1818';
  }
}

function drawSpruce(x, y) {
  ctx.fillStyle = '#1a4a2e';
  ctx.beginPath();
  ctx.moveTo(x, y - 80);
  ctx.lineTo(x - 25, y - 30);
  ctx.lineTo(x - 15, y - 30);
  ctx.lineTo(x - 30, y);
  ctx.lineTo(x + 30, y);
  ctx.lineTo(x + 15, y - 30);
  ctx.lineTo(x + 25, y - 30);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#3d2817';
  ctx.fillRect(x - 4, y, 8, 8);
}

function drawPlatforms() {
  for (const p of level.platforms) {
    const x = p.x - cameraX;
    if (x + p.w < 0 || x > VIEW_W) continue;
    if (p.type === 'ground') {
      // Брусчатка Амстердама — пиксельная
      // Основной слой
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Верхняя полоса травы
      ctx.fillStyle = '#3a7a3a';
      ctx.fillRect(x, p.y, p.w, 4);
      ctx.fillStyle = '#5a9a5a';
      for (let i = 0; i < p.w; i += 4) {
        if ((i + Math.floor(p.x)) % 8 === 0) ctx.fillRect(x + i, p.y, 2, 2);
      }
      // Земля под травой
      ctx.fillStyle = '#7a5a3a';
      ctx.fillRect(x, p.y + 4, p.w, 6);
      // Кирпичная брусчатка
      ctx.fillStyle = '#4a3a2a';
      for (let r = 0; r < Math.floor((p.h - 10) / 8); r++) {
        const offset = r % 2 === 0 ? 0 : 12;
        for (let i = offset; i < p.w; i += 24) {
          // Кирпич: тёмная рамка
          ctx.fillRect(x + i, p.y + 10 + r * 8, 22, 2);
          ctx.fillRect(x + i, p.y + 10 + r * 8, 2, 6);
        }
      }
      // Светлые точки на кирпичах
      ctx.fillStyle = '#8a6a4a';
      for (let i = 4; i < p.w; i += 8) {
        for (let j = 14; j < p.h; j += 8) {
          ctx.fillRect(x + i, p.y + j, 2, 2);
        }
      }
    } else if (p.type === 'sand') {
      // Пляжный песок — с пиксельными деталями
      ctx.fillStyle = '#e8c878';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Светлая верхняя полоса
      ctx.fillStyle = '#f8e8a8';
      ctx.fillRect(x, p.y, p.w, 4);
      ctx.fillStyle = '#f0d8a0';
      ctx.fillRect(x, p.y + 4, p.w, 4);
      // Пиксельные крупинки
      ctx.fillStyle = '#c8a050';
      for (let i = 0; i < p.w; i += 6) {
        for (let j = 10; j < p.h; j += 6) {
          if ((i * 7 + j * 3) % 11 < 4) ctx.fillRect(x + i, p.y + j, 2, 2);
        }
      }
      // Более тёмные пятна
      ctx.fillStyle = '#a08040';
      for (let i = 3; i < p.w; i += 14) {
        for (let j = 14; j < p.h; j += 12) {
          if ((i + j) % 7 === 0) ctx.fillRect(x + i, p.y + j, 2, 2);
        }
      }
      // Ракушки на песке (редко)
      ctx.fillStyle = '#ffe0c0';
      for (let i = 12; i < p.w; i += 60) {
        ctx.fillRect(x + i, p.y + 2, 4, 2);
        ctx.fillRect(x + i + 1, p.y + 4, 2, 1);
      }
    } else if (p.type === 'stone') {
      // Каменная кладка Пекина
      ctx.fillStyle = '#6a5a4a';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Верхняя полоса (светлее)
      ctx.fillStyle = '#8a7a6a';
      ctx.fillRect(x, p.y, p.w, 4);
      ctx.fillStyle = '#7a6a5a';
      ctx.fillRect(x, p.y + 4, p.w, 4);
      // Пиксельные блоки кладки
      ctx.fillStyle = '#4a3a2a';
      for (let r = 0; r < Math.floor((p.h - 8) / 12); r++) {
        const offset = r % 2 === 0 ? 0 : 20;
        for (let i = offset; i < p.w; i += 40) {
          // Контур блока
          ctx.fillRect(x + i, p.y + 8 + r * 12, 38, 2);
          ctx.fillRect(x + i, p.y + 8 + r * 12, 2, 12);
        }
      }
      // Светлые точки на блоках
      ctx.fillStyle = '#8a7a5a';
      for (let i = 8; i < p.w; i += 10) {
        for (let j = 14; j < p.h; j += 12) {
          if ((i + j * 3) % 13 < 3) ctx.fillRect(x + i, p.y + j, 2, 2);
        }
      }
    } else if (p.type === 'mountain') {
      // Горная порода Алматы со снегом сверху
      ctx.fillStyle = '#6a7a90';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Снежная шапка
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, p.y, p.w, 6);
      ctx.fillStyle = '#e0e8f0';
      ctx.fillRect(x, p.y + 6, p.w, 3);
      // Пиксельные пятна снега неровно
      ctx.fillStyle = '#fff';
      for (let i = 0; i < p.w; i += 12) {
        if ((i * 3) % 7 < 3) ctx.fillRect(x + i, p.y + 9, 4, 2);
      }
      // Скальные трещины
      ctx.fillStyle = '#4a5a70';
      for (let i = 0; i < p.w; i += 16) {
        for (let j = 14; j < p.h; j += 10) {
          if ((i + j) % 12 < 4) ctx.fillRect(x + i, p.y + j, 3, 2);
        }
      }
      // Светлые блики на камне
      ctx.fillStyle = '#8a9aaf';
      for (let i = 6; i < p.w; i += 20) {
        for (let j = 18; j < p.h; j += 14) {
          ctx.fillRect(x + i, p.y + j, 3, 2);
        }
      }
      // Тёмная нижняя полоса
      ctx.fillStyle = '#4a5a70';
      ctx.fillRect(x, p.y + p.h - 3, p.w, 3);
    } else if (p.type === 'platform') {
      // Деревянная платформа (мост/баржа)
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Верхняя светлая полоса
      ctx.fillStyle = '#a87040';
      ctx.fillRect(x, p.y, p.w, 4);
      // Нижняя тень
      ctx.fillStyle = '#5b3a1b';
      ctx.fillRect(x, p.y + p.h - 4, p.w, 4);
      // Доски (вертикальные пиксельные линии)
      ctx.fillStyle = '#6b3e1a';
      for (let i = 0; i < p.w; i += 14) {
        ctx.fillRect(x + i, p.y + 4, 2, p.h - 8);
      }
      // Шляпки гвоздей
      ctx.fillStyle = '#404040';
      for (let i = 6; i < p.w; i += 14) {
        ctx.fillRect(x + i, p.y + 6, 2, 2);
        ctx.fillRect(x + i, p.y + p.h - 8, 2, 2);
      }
    } else if (p.type === 'rock') {
      // Скала Пхукета
      ctx.fillStyle = '#9a8a6a';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Верхний светлый кант
      ctx.fillStyle = '#b8a888';
      ctx.fillRect(x, p.y, p.w, 4);
      // Тёмные пиксельные пятна (тени трещин)
      ctx.fillStyle = '#6a5a3a';
      for (let i = 4; i < p.w; i += 12) {
        ctx.fillRect(x + i, p.y + 8, 4, 2);
        ctx.fillRect(x + i + 2, p.y + 12, 3, 2);
      }
      // Нижняя тень
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(x, p.y + p.h - 4, p.w, 4);
    } else if (p.type === 'wall') {
      // Красно-золотая платформа Пекина — пагода-стиль
      ctx.fillStyle = '#c54545';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Золотые канты сверху и снизу
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(x, p.y, p.w, 4);
      ctx.fillRect(x, p.y + p.h - 4, p.w, 4);
      // Тёмная середина с орнаментом
      ctx.fillStyle = '#8a2020';
      ctx.fillRect(x, p.y + 4, p.w, 2);
      ctx.fillRect(x, p.y + p.h - 6, p.w, 2);
      // Иероглифические штрихи на красном
      ctx.fillStyle = '#ffeb99';
      for (let i = 4; i < p.w - 4; i += 16) {
        ctx.fillRect(x + i, p.y + 8, 2, 2);
        ctx.fillRect(x + i + 4, p.y + 8, 2, 2);
        ctx.fillRect(x + i + 2, p.y + 11, 2, 2);
      }
    } else if (p.type === 'snow') {
      // Снежная платформа
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, p.y, p.w, p.h);
      // Голубоватая тень
      ctx.fillStyle = '#d8e8f8';
      ctx.fillRect(x, p.y + p.h - 4, p.w, 4);
      // Пиксельные сугробики
      ctx.fillStyle = '#e8f0fa';
      for (let i = 0; i < p.w; i += 8) {
        if ((i * 3) % 7 < 3) ctx.fillRect(x + i, p.y, 4, 2);
      }
      // Голубые искорки
      ctx.fillStyle = '#a8c8e8';
      for (let i = 4; i < p.w; i += 10) {
        ctx.fillRect(x + i, p.y + 8, 1, 1);
      }
    }
  }
}

function drawHazards() {
  for (const h of level.hazards) {
    const x = h.x - cameraX;
    if (x + h.w < 0 || x > VIEW_W) continue;
    if (level.bg === 'amsterdam' || level.bg === 'phuket') {
      // Вода
      ctx.fillStyle = level.bg === 'phuket' ? '#3aaadd' : '#4a6a8a';
      ctx.fillRect(x, h.y, h.w, GAME_H - h.y);
      // Волны
      ctx.fillStyle = '#fff';
      for (let i = 0; i < h.w; i += 16) {
        const wy = h.y + Math.sin((Date.now() / 200 + i) * 0.1) * 3;
        ctx.fillRect(x + i, wy, 8, 2);
      }
    } else if (level.bg === 'beijing') {
      // Лава/яма
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x, h.y, h.w, GAME_H - h.y);
      ctx.fillStyle = '#ff4500';
      for (let i = 0; i < h.w; i += 8) {
        ctx.fillRect(x + i, h.y + 4, 4, 2);
      }
    } else if (level.bg === 'almaty') {
      // Пропасть со снегом
      ctx.fillStyle = '#2a3040';
      ctx.fillRect(x, h.y, h.w, GAME_H - h.y);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x, h.y, h.w, 4);
    }
  }
}

function drawCoins() {
  for (const c of level.coins) {
    if (c.collected) continue;
    const x = Math.floor(c.x - cameraX);
    if (x < -30 || x > VIEW_W + 30) continue;
    const bob = Math.floor(Math.sin((Date.now() / 200) + c.x * 0.01) * 2);
    // Анимация поворота — меняем ширину
    const t = Math.floor(Date.now() / 100) + Math.floor(c.x / 30);
    const phase = t % 8;
    let widths;
    if (phase < 2) widths = [16, 14, 10, 6]; // полный
    else if (phase < 4) widths = [10, 8, 6, 4]; // боком
    else if (phase < 6) widths = [4, 6, 8, 10]; // боком в обратную
    else widths = [10, 14, 16, 14]; // снова анфас
    const baseW = widths[Math.min(3, phase % 4)];
    // Тело монеты
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(x + (16 - baseW) / 2, c.y + 2 + bob, baseW, 16);
    // Светлый блик
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(x + (16 - baseW) / 2, c.y + 2 + bob, baseW, 4);
    // Очень светлый блик сверху
    ctx.fillStyle = '#fff5b0';
    ctx.fillRect(x + (16 - baseW) / 2 + 2, c.y + 2 + bob, Math.max(2, baseW - 4), 2);
    // Тень снизу
    ctx.fillStyle = '#cc7700';
    ctx.fillRect(x + (16 - baseW) / 2, c.y + 16 + bob, baseW, 2);
    // Знак "$" в центре (только когда монета анфас)
    if (baseW >= 10) {
      ctx.fillStyle = '#cc7700';
      ctx.fillRect(x + 7, c.y + 6 + bob, 2, 8);
      ctx.fillRect(x + 5, c.y + 7 + bob, 6, 2);
      ctx.fillRect(x + 5, c.y + 11 + bob, 6, 2);
    }
  }
}

function drawEnemies() {
  for (const e of level.enemies) {
    if (e.dead) continue;
    const box = getEnemyBox(e);
    const x = box.x - cameraX;
    if (x < -100 || x > VIEW_W + 50) continue;
    if (e.type === 'bike') drawBike(x, box.y, e.dir);
    else if (e.type === 'tulip') drawTulip(x, box.y);
    else if (e.type === 'crab') drawCrab(x, box.y, e.dir);
    else if (e.type === 'coconut') drawCoconutPalm(x, box.y, e);
    else if (e.type === 'dragon') drawDragon(x, box.y, e.dir);
    else if (e.type === 'lantern') drawLantern(x, box.y);
    else if (e.type === 'goat') drawGoat(x, box.y, e.dir);
    else if (e.type === 'apple') drawApple(x, box.y);
    else if (e.type === 'snowball') drawSnowball(x, box.y);
  }
}

function drawCoconutPalm(x, y, e) {
  // Пальма с падающим кокосом
  ctx.fillStyle = '#6b4423';
  ctx.fillRect(x + 8, y - 100, 8, 100);
  ctx.fillStyle = '#2d8a3e';
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI - Math.PI / 2;
    ctx.save();
    ctx.translate(x + 12, y - 100);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(20, 0, 20, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Кокос (либо на пальме, либо падает)
  ctx.fillStyle = '#3d2817';
  if (e.falling) {
    ctx.beginPath();
    ctx.arc(x + 12, e.fallY, 10, 0, Math.PI * 2);
    ctx.fill();
    // Лицо кокоса (грустное, падает)
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 8, e.fallY - 3, 2, 2);
    ctx.fillRect(x + 14, e.fallY - 3, 2, 2);
  } else {
    ctx.beginPath();
    ctx.arc(x + 12, y - 95, 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === ПОДГОТОВКА ЛИЦА (фон уже удалён в исходнике) ===
let faceCrop = null;
let faceCropFlipped = null;

function buildFaceSprite() {
  if (!faceImg.complete || faceImg.naturalWidth === 0) return;
  const sw = faceImg.naturalWidth;
  const sh = faceImg.naturalHeight;

  // Просто копируем оригинальное изображение
  const tmp = document.createElement('canvas');
  tmp.width = sw;
  tmp.height = sh;
  const tctx = tmp.getContext('2d');
  tctx.imageSmoothingEnabled = true;
  tctx.imageSmoothingQuality = 'high';
  tctx.drawImage(faceImg, 0, 0);
  faceCrop = tmp;

  // Зеркальная версия
  const tmp2 = document.createElement('canvas');
  tmp2.width = sw;
  tmp2.height = sh;
  const t2 = tmp2.getContext('2d');
  t2.imageSmoothingEnabled = true;
  t2.imageSmoothingQuality = 'high';
  t2.translate(sw, 0);
  t2.scale(-1, 1);
  t2.drawImage(tmp, 0, 0);
  faceCropFlipped = tmp2;
}
faceImg.addEventListener('load', buildFaceSprite);
if (faceImg.complete && faceImg.naturalWidth > 0) {
  buildFaceSprite();
}

function drawPlayer() {
  const x = Math.floor(player.x - cameraX);
  const y = Math.floor(player.y);
  if (player.invuln > 0 && Math.floor(player.invuln / 5) % 2 === 0) return;

  const bob = player.onGround ? Math.floor(Math.sin(player.bobble) * 1) : 0;
  const running = Math.abs(player.vx) > 0.5 && player.onGround;
  const jumping = !player.onGround;
  const legPhase = Math.sin(player.bobble * 2);

  // ===== ТЕЛО =====
  // ФУТБОЛКА
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x + 4, y + 30, 28, 16);
  // Складки на футболке
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(x + 6, y + 32, 2, 10);
  ctx.fillRect(x + 28, y + 32, 2, 10);
  // Тень снизу футболки
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x + 4, y + 44, 28, 2);

  // ===== ШЕЯ-ПЛЕЧИ (плавный переход от футболки к голове) =====
  // Подложка кожи в районе шеи — выходит из футболки вверх
  // Основная шея
  ctx.fillStyle = '#d8a070';
  ctx.fillRect(x + 12, y + 26, 12, 6);
  // Светлая часть шеи (передняя)
  ctx.fillStyle = '#e8b888';
  ctx.fillRect(x + 13, y + 26, 10, 4);
  // Тень шеи (под подбородком)
  ctx.fillStyle = '#a87858';
  ctx.fillRect(x + 12, y + 30, 12, 2);
  // Воротник футболки V-образный (поверх шеи)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x + 10, y + 30, 4, 2);
  ctx.fillRect(x + 22, y + 30, 4, 2);
  ctx.fillRect(x + 12, y + 32, 2, 2);
  ctx.fillRect(x + 22, y + 32, 2, 2);
  // Внутренний край воротника
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(x + 14, y + 32, 8, 1);

  // РУКИ
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x + 0, y + 30, 4, 10);
  ctx.fillRect(x + 32, y + 30, 4, 10);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x + 0, y + 38, 4, 2);
  ctx.fillRect(x + 32, y + 38, 4, 2);
  // Кисти
  ctx.fillStyle = '#f0c896';
  if (running) {
    const armSwing = Math.floor(Math.sin(player.bobble * 2) * 2);
    ctx.fillRect(x + 0, y + 40 + armSwing, 4, 5);
    ctx.fillRect(x + 32, y + 40 - armSwing, 4, 5);
  } else {
    ctx.fillRect(x + 0, y + 40, 4, 5);
    ctx.fillRect(x + 32, y + 40, 4, 5);
  }
  ctx.fillStyle = '#c89868';
  ctx.fillRect(x + 0, y + 44, 4, 1);
  ctx.fillRect(x + 32, y + 44, 4, 1);

  // ШТАНЫ И НОГИ
  ctx.fillStyle = '#5a4030';
  ctx.fillRect(x + 6, y + 46, 24, 2);
  if (jumping) {
    ctx.fillStyle = '#3a4a6a';
    ctx.fillRect(x + 8, y + 48, 8, 6);
    ctx.fillRect(x + 20, y + 48, 8, 6);
    ctx.fillStyle = '#2a3a5a';
    ctx.fillRect(x + 8, y + 52, 8, 2);
    ctx.fillRect(x + 20, y + 52, 8, 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 6, y + 54, 12, 3);
    ctx.fillRect(x + 18, y + 54, 12, 3);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 6, y + 54, 12, 1);
    ctx.fillRect(x + 18, y + 54, 12, 1);
  } else if (running) {
    const yLeft = y + 48 + Math.max(0, Math.floor(legPhase * 2));
    const yRight = y + 48 + Math.max(0, Math.floor(-legPhase * 2));
    ctx.fillStyle = '#3a4a6a';
    ctx.fillRect(x + 8, yLeft, 8, 4);
    ctx.fillRect(x + 20, yRight, 8, 4);
    ctx.fillStyle = '#2a3a5a';
    ctx.fillRect(x + 8, yLeft + 3, 8, 1);
    ctx.fillRect(x + 20, yRight + 3, 8, 1);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 6, yLeft + 4, 12, 3);
    ctx.fillRect(x + 18, yRight + 4, 12, 3);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 6, yLeft + 4, 12, 1);
    ctx.fillRect(x + 18, yRight + 4, 12, 1);
  } else {
    ctx.fillStyle = '#3a4a6a';
    ctx.fillRect(x + 8, y + 48, 8, 6);
    ctx.fillRect(x + 20, y + 48, 8, 6);
    ctx.fillStyle = '#2a3a5a';
    ctx.fillRect(x + 8, y + 52, 8, 2);
    ctx.fillRect(x + 20, y + 52, 8, 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 6, y + 54, 12, 3);
    ctx.fillRect(x + 18, y + 54, 12, 3);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x + 6, y + 54, 12, 1);
    ctx.fillRect(x + 18, y + 54, 12, 1);
  }

  // ===== ГОЛОВА — ЧИСТОЕ ФОТО БЕЗ ФОНА =====
  if (faceCrop) {
    const sprite = player.facing < 0 ? faceCropFlipped : faceCrop;
    const prevSmooth = ctx.imageSmoothingEnabled;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    // Голова чуть шире и накрывает верх шеи — за счёт fade-out внизу
    // лицо плавно переходит в нарисованную шею
    ctx.drawImage(sprite, x + 3, y - 6 + bob, 30, 38);
    ctx.imageSmoothingEnabled = prevSmooth;
  } else {
    // Фоллбэк
    ctx.fillStyle = '#f0c896';
    ctx.fillRect(x + 4, y + 2 + bob, 28, 26);
  }
}

// === ГЛАВНЫЙ ЦИКЛ ===
function gameLoop() {
  if (gameState === 'playing') {
    updatePlayer();
    if (gameState === 'playing') updateEnemies();
  }

  // Очищаем весь canvas
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  if (level) {
    // Применяем зум и смещение по Y
    // ZOOM*x + 0, ZOOM*y - ZOOM*cameraY
    ctx.setTransform(ZOOM, 0, 0, ZOOM, 0, -cameraY * ZOOM);
    ctx.imageSmoothingEnabled = false;
    drawBackground();
    drawHazards();
    drawPlatforms();
    drawCoins();
    drawFinish();
    drawEnemies();
    drawPlayer();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  requestAnimationFrame(gameLoop);
}

// === ИНТРО МУЗЫКА (Web Audio API + HTML Audio fallback) ===
const introAudio = document.getElementById('intro-audio');
introAudio.volume = 0.7;
introAudio.loop = false;
let audioCtx = null;
let audioBuffer = null;
let audioBytes = null; // декодированные байты mp3
let audioSource = null;
let introStarted = false;
let introStopped = false;
let audioLoadStarted = false;

// Декодируем base64 в байты заранее (не требует user gesture)
function prepareAudioBytes() {
  if (audioBytes) return;
  try {
    const src = introAudio.src;
    const base64 = src.split(',')[1];
    const binaryString = atob(base64);
    const bytes = new Uint8Array(binaryString.length);
    for (let i = 0; i < binaryString.length; i++) {
      bytes[i] = binaryString.charCodeAt(i);
    }
    audioBytes = bytes;
    console.log('Audio bytes prepared:', bytes.length);
  } catch (err) {
    console.error('Prepare bytes error:', err);
  }
}
prepareAudioBytes();

// Декодируем заранее подготовленные байты в AudioBuffer
async function loadAudioBuffer() {
  if (audioBuffer) return audioBuffer;
  if (audioLoadStarted) {
    for (let i = 0; i < 100; i++) {
      await new Promise(r => setTimeout(r, 50));
      if (audioBuffer) return audioBuffer;
    }
    return null;
  }
  audioLoadStarted = true;
  try {
    if (!audioBytes) {
      prepareAudioBytes();
    }
    if (!audioBytes) {
      console.error('No audio bytes available');
      return null;
    }
    console.log('Calling decodeAudioData with', audioBytes.length, 'bytes');
    // Копируем буфер чтобы избежать "detached ArrayBuffer" в iOS
    const bufferCopy = audioBytes.buffer.slice(0);
    audioBuffer = await new Promise((resolve, reject) => {
      audioCtx.decodeAudioData(bufferCopy, resolve, reject);
    });
    console.log('Audio decoded:', audioBuffer.duration, 'sec');
    return audioBuffer;
  } catch (err) {
    console.error('Audio load error:', err && err.message ? err.message : err);
    audioLoadStarted = false;
    return null;
  }
}

async function tryPlayIntro() {
  if (introStopped) return;
  if (introStarted) return;
  console.log('tryPlayIntro called');

  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) {
      console.log('No Web Audio API, fallback');
      tryHtmlAudioFallback();
      return;
    }
    try {
      audioCtx = new AC();
      console.log('AudioContext created, state:', audioCtx.state);
    } catch (err) {
      console.error('AudioContext creation failed:', err);
      tryHtmlAudioFallback();
      return;
    }
  }

  // НЕ ждём resume() - в iOS WebView его промис не резолвится
  // Просто вызываем и продолжаем
  if (audioCtx.state === 'suspended') {
    try {
      audioCtx.resume().then(() => {
        console.log('Resume promise resolved, state:', audioCtx.state);
      }).catch(err => {
        console.error('Resume failed:', err);
      });
    } catch (err) {
      console.error('Resume throw:', err);
    }
  }

  if (introStopped) return;

  if (!audioBuffer) {
    console.log('Loading audio buffer...');
    await loadAudioBuffer();
  }
  if (!audioBuffer) {
    console.log('Buffer not loaded, trying HTML fallback');
    tryHtmlAudioFallback();
    return;
  }

  if (introStopped) return;

  try {
    if (audioSource) {
      try { audioSource.stop(); } catch(e) {}
    }
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.7;
    audioSource.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    audioSource.start(0);
    introStarted = true;
    console.log('Audio playing via Web Audio API, ctx state:', audioCtx.state);
  } catch (err) {
    console.error('Play error:', err);
    tryHtmlAudioFallback();
  }
}

function tryHtmlAudioFallback() {
  if (introStarted || introStopped) return;
  try {
    introAudio.currentTime = 0;
    const p = introAudio.play();
    if (p) {
      p.then(() => {
        if (introStopped) {
          introAudio.pause();
          return;
        }
        introStarted = true;
        console.log('HTML audio fallback playing');
      }).catch(err => {
        console.error('HTML audio fallback failed:', err);
      });
    } else {
      introStarted = true;
    }
  } catch (err) {
    console.error('HTML audio error:', err);
  }
}

// СИНХРОННЫЙ обработчик - не использует await до play()
function firstInteract() {
  if (introStarted || introStopped) return;
  console.log('firstInteract - synchronous attempt');

  // ПРИОРИТЕТ 1: HTML audio play() - синхронный вызов в user gesture
  try {
    introAudio.muted = false;
    introAudio.volume = 0.7;
    introAudio.currentTime = 0;
    const p = introAudio.play();
    if (p && p.then) {
      p.then(() => {
        introStarted = true;
        console.log('HTML audio playing!');
      }).catch(err => {
        console.log('HTML audio rejected:', err.name, '- trying Web Audio');
        // Fallback на Web Audio (но это уже не в gesture контексте)
        tryWebAudio();
      });
    } else {
      introStarted = true;
      console.log('HTML audio started (no promise)');
    }
  } catch (err) {
    console.error('HTML audio sync error:', err);
    tryWebAudio();
  }
}

async function tryWebAudio() {
  if (introStarted || introStopped) return;
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try { audioCtx = new AC(); } catch(e) { return; }
  }
  // Запускаем resume в фоне без await
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  if (!audioBuffer) await loadAudioBuffer();
  if (!audioBuffer || introStopped || introStarted) return;
  try {
    audioSource = audioCtx.createBufferSource();
    audioSource.buffer = audioBuffer;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.7;
    audioSource.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    audioSource.start(0);
    introStarted = true;
    console.log('Web Audio playing, state:', audioCtx.state);
  } catch (err) {
    console.error('Web Audio play error:', err);
  }
}

document.addEventListener('pointerdown', firstInteract, true);
document.addEventListener('keydown', firstInteract, true);
document.addEventListener('touchstart', firstInteract, true);
document.addEventListener('click', firstInteract, true);

function stopIntro() {
  introStopped = true;
  if (audioSource) {
    try { audioSource.stop(); } catch(e) {}
    audioSource = null;
  }
  try { introAudio.pause(); } catch(e) {}
  introStarted = false;
}

function resetIntro() {
  introStopped = false;
  introStarted = false;
}

// === КНОПКИ ===
// Карточки городов
document.querySelectorAll('.city-card').forEach(card => {
  card.addEventListener('click', () => {
    stopIntro();
    const level = parseInt(card.getAttribute('data-level'), 10);
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('ui-overlay').classList.remove('hidden');
    currentLevel = level;
    totalCoins = 0;
    lives = 3;
    loadLevel(currentLevel);
    gameState = 'playing';
  });
});

document.getElementById('next-btn').addEventListener('click', () => {
  document.getElementById('level-complete-screen').classList.add('hidden');
  document.getElementById('ui-overlay').classList.remove('hidden');
  currentLevel++;
  loadLevel(currentLevel);
  gameState = 'playing';
});

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
  resetIntro();
  tryPlayIntro();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
  resetIntro();
  tryPlayIntro();
});

// Старт цикла
gameLoop();
</script>
